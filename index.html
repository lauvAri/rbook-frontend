    <meta charset="UTF-8" />

    <!-- 预加载背景图片 -->
    <link rel="preload" as="image" href="/bg.webp" type="image/webp">
  </head>
  <body>
    <div id="root">
      <style>
        .html-loading {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background: #f8f9fa;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        @media (prefers-color-scheme: dark) {
          .html-loading { background: #23272f; }
          .html-loading-bar { background: #2e3540; }
          .html-loading-bar::after { background: linear-gradient(90deg, transparent, #3a4252, transparent); }
          .html-loading-text { color: #9aa2ad; }
        }
        .html-loading-bars {
          display: flex;
          flex-direction: column;
          gap: 12px;
          width: min(480px, 90vw);
        }
        .html-loading-bar {
          height: 18px;
          border-radius: 6px;
          background: #e0e0e0;
          overflow: hidden;
          position: relative;
        }
        .html-loading-bar::after {
          content: '';
          position: absolute;
          inset: 0;
          background: linear-gradient(90deg, transparent, #f0f0f0, transparent);
          animation: html-shimmer 1.4s infinite;
        }
        @keyframes html-shimmer {
          from { transform: translateX(-100%); }
          to   { transform: translateX(100%); }
        }
        .html-loading-bar:nth-child(1) { width: 100%; }
        .html-loading-bar:nth-child(2) { width: 75%; }
        .html-loading-bar:nth-child(3) { width: 90%; }
        .html-loading-bar:nth-child(4) { width: 60%; }
        .html-loading-text {
          margin-top: 20px;
          font-size: 13px;
          color: #999;
          letter-spacing: 0.02em;
        }
      </style>
      <div class="html-loading">
        <div class="html-loading-bars">
          <div class="html-loading-bar"></div>
          <div class="html-loading-bar"></div>
          <div class="html-loading-bar"></div>
          <div class="html-loading-bar"></div>
        </div>
        <p class="html-loading-text">加载中...</p>
      </div>
    </div>
